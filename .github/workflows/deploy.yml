name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/student-app:${{ github.sha }} .

      - name: Tag as latest
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/student-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/student-app:latest

      - name: Push sha tag
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-app:${{ github.sha }}

      - name: Push latest tag
        run: docker push ${{ secrets.DOCKER_USERNAME }}/student-app:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="alongdocker69/student-app"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" --max-time 60 -X POST \
            "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=6&container_port=$CONTAINER_PORT&strict_container_port=0&registry_username=${{ secrets.DOCKER_USERNAME }}&registry_password=${{ secrets.DOCKER_PASSWORD }}" \
            || echo "\n000")
          BODY=$(echo "$RESPONSE" | head -n -1)
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"

          if [ "$CODE" = "502" ] || [ "$CODE" = "524" ] || [ "$CODE" = "000" ]; then
            echo "Warning: Server chưa sẵn sàng (HTTP $CODE) — bỏ qua."
            exit 0
          fi

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại (HTTP $CODE)."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
